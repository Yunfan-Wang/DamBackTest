name: DAMBT CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all packages
        run: go build ./...

      - name: Run final tests
        working-directory: ../../
        run: make final

      - name: Run performance tests
        working-directory: ../../
        run: make perf